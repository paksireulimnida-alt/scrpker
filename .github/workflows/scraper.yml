name: Glints Hourly Scraper

on:
  workflow_dispatch: # Triggered by cron-job.org

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Puppeteer Browser
      run: npx puppeteer browsers install chrome
      env:
        PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache

    - name: Run Scraper
      env:
        FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
        WHATSAPP_TARGET: ${{ secrets.WHATSAPP_TARGET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Puppeteer cache configuration for GHA
        PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache
      run: node scraper.js

    - name: Commit Job History
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add processed_jobs.json
        git diff-index --quiet HEAD || git commit -m "Update job history [skip ci]"
        git pull --rebase origin main
        git push

